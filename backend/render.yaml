services:
  - type: web
    name: gold-system-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: TWELVE_DATA_KEY
        sync: false
      - key: SIGNAL_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false   # Valeur à renseigner : URL Vercel ex: https://gold-system.vercel.app
